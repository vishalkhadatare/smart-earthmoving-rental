name: equippro
description: "EquipPro – Smart Earthmoving Management System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  google_sign_in: 6.2.1
  sign_in_with_apple: ^7.0.1

  # State management (new)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # State management (legacy – will be removed after migration)
  provider: ^6.1.5+1

  # Database (legacy screens – will be replaced by API calls)
  cloud_firestore: ^6.1.3

  # Navigation
  go_router: ^14.8.1

  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_native_splash: ^2.4.6

  # Utils
  intl: 0.20.2
  shared_preferences: ^2.3.4
  image_picker: ^1.1.2
  file_picker: ^10.3.10
  geolocator: ^13.0.2
  url_launcher: ^6.3.1
  firebase_storage: ^13.1.0
  http: ^1.6.0
  easy_localization: ^3.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  flutter_launcher_icons: ^0.14.1

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/images/
    - assets/translations/

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

# ── Native Splash (shown during engine boot) ──
flutter_native_splash:
  color: "#0A0C1A"
  color_dark: "#0A0C1A"
  android_12:
    color: "#0A0C1A"
    color_dark: "#0A0C1A"

# ── App Launcher Icon ──
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon.png"
