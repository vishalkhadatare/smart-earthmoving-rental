<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Construction site background -->
  <rect x="0" y="240" width="400" height="60" fill="#FFF3E0" rx="4"/>
  
  <!-- Crane -->
  <rect x="60" y="80" width="8" height="160" fill="#FF6B00" rx="2"/>
  <rect x="40" y="80" width="120" height="6" fill="#FF8C3A" rx="2"/>
  <line x1="160" y1="80" x2="160" y2="140" stroke="#E65100" stroke-width="2"/>
  <rect x="152" y="140" width="16" height="20" fill="#FF6B00" rx="3"/>
  
  <!-- Excavator body -->
  <rect x="200" y="180" width="100" height="50" rx="10" fill="#FF6B00"/>
  <rect x="210" y="160" width="40" height="30" rx="6" fill="#FF8C3A"/>
  <!-- Excavator arm -->
  <line x1="250" y1="170" x2="320" y2="120" stroke="#E65100" stroke-width="6" stroke-linecap="round"/>
  <line x1="320" y1="120" x2="350" y2="160" stroke="#E65100" stroke-width="5" stroke-linecap="round"/>
  <!-- Excavator bucket -->
  <path d="M345 155 L360 170 L340 175 Z" fill="#FF6B00"/>
  <!-- Tracks -->
  <ellipse cx="220" cy="235" rx="20" ry="10" fill="#E65100"/>
  <ellipse cx="280" cy="235" rx="20" ry="10" fill="#E65100"/>
  <rect x="200" y="225" width="100" height="20" rx="10" fill="#E65100"/>
  
  <!-- Constructor person -->
  <circle cx="140" cy="165" r="14" fill="#FFB74D"/>
  <!-- Hard hat -->
  <path d="M126 160 Q140 145 154 160" fill="#FF6B00"/>
  <rect x="124" y="158" width="32" height="4" rx="2" fill="#FF6B00"/>
  <!-- Body -->
  <rect x="130" y="180" width="20" height="35" rx="4" fill="#FF8C3A"/>
  <!-- Arms -->
  <line x1="130" y1="190" x2="115" y2="205" stroke="#FF8C3A" stroke-width="5" stroke-linecap="round"/>
  <line x1="150" y1="190" x2="165" y2="200" stroke="#FF8C3A" stroke-width="5" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="135" y1="215" x2="132" y2="240" stroke="#E65100" stroke-width="5" stroke-linecap="round"/>
  <line x1="145" y1="215" x2="148" y2="240" stroke="#E65100" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Search magnifier -->
  <circle cx="330" cy="70" r="25" fill="none" stroke="#FF6B00" stroke-width="4"/>
  <line x1="349" y1="89" x2="365" y2="105" stroke="#FF6B00" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Small buildings -->
  <rect x="20" y="200" width="30" height="40" fill="#FFE0B2" rx="3"/>
  <rect x="25" y="210" width="8" height="8" fill="#FF6B00" rx="1"/>
  <rect x="37" y="210" width="8" height="8" fill="#FF6B00" rx="1"/>
  <rect x="25" y="222" width="8" height="8" fill="#FF6B00" rx="1"/>
  <rect x="37" y="222" width="8" height="8" fill="#FF6B00" rx="1"/>
  
  <rect x="360" y="200" width="30" height="40" fill="#FFE0B2" rx="3"/>
  <rect x="365" y="210" width="8" height="8" fill="#FF6B00" rx="1"/>
  <rect x="377" y="210" width="8" height="8" fill="#FF6B00" rx="1"/>
</svg>
